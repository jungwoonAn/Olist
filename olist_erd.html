
<style>
#erd-wrap svg { max-width: 100%; }
</style>
<div id="erd-wrap" style="padding: 8px 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f4f2eb',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
  },
});

const diagram = `erDiagram
  CUSTOMERS ||--o{ ORDERS : "주문"
  ORDERS ||--|{ ORDER_ITEMS : "포함"
  ORDERS ||--o{ PAYMENTS : "결제"
  ORDERS ||--o| REVIEWS : "리뷰"
  ORDER_ITEMS }o--|| PRODUCTS : "상품"
  ORDER_ITEMS }o--|| SELLERS : "판매자"
  PRODUCTS }o--o| CATEGORY : "카테고리"

  CUSTOMERS {
    string customer_id PK
    string customer_unique_id
    int customer_zip_code_prefix
    string customer_city
    string customer_state
  }
  ORDERS {
    string order_id PK
    string customer_id FK
    string order_status
    datetime order_purchase_timestamp
    datetime order_approved_at
    datetime order_delivered_carrier_date
    datetime order_delivered_customer_date
    datetime order_estimated_delivery_date
  }
  ORDER_ITEMS {
    string order_id FK
    int order_item_id
    string product_id FK
    string seller_id FK
    datetime shipping_limit_date
    float price
    float freight_value
  }
  PRODUCTS {
    string product_id PK
    string product_category_name FK
    int product_name_lenght
    int product_description_lenght
    int product_photos_qty
    float product_weight_g
    float product_length_cm
    float product_height_cm
    float product_width_cm
  }
  PAYMENTS {
    string order_id FK
    int payment_sequential
    string payment_type
    int payment_installments
    float payment_value
  }
  REVIEWS {
    string review_id PK
    string order_id FK
    int review_score
    string review_comment_title
    string review_comment_message
    datetime review_creation_date
    datetime review_answer_timestamp
  }
  SELLERS {
    string seller_id PK
    int seller_zip_code_prefix
    string seller_city
    string seller_state
  }
  CATEGORY {
    string product_category_name PK
    string product_category_name_english
  }
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd-wrap').innerHTML = svg;

document.querySelectorAll('#erd-wrap svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd-wrap svg .row-rect-odd path, #erd-wrap svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
